<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>放置型クラフトRPG テストプレイ</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1e2027;
    --panel2: #262833;
    --border: #34363f;
    --text: #e8e8ec;
    --text-dim: #9a9ba5;
    --accent: #7c6df0;
    --accent-dim: #4a3fa0;
    --danger: #e0556a;
    --warn: #d8a73f;
    --safe: #4caf7c;
    --gold: #d8b34a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    font-size: 14px;
    padding-bottom: 70px;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .topbar .stat { font-size: 12px; color: var(--text-dim); }
  .topbar .stat b { color: var(--gold); }
  .screen { padding: 14px; max-width: 720px; margin: 0 auto; }
  .hidden { display: none !important; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card h3 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .muted { color: var(--text-dim); font-size: 12px; }

  button {
    background: var(--accent-dim);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--panel2); border: 1px solid var(--border); }
  button.danger { background: #5a2230; }
  button.small { padding: 4px 10px; font-size: 12px; }

  .dungeon-list { display: flex; flex-direction: column; gap: 8px; }
  .dungeon-item {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
  }
  .dungeon-item:hover { border-color: var(--accent); }
  .danger-label {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .danger-safe { background: rgba(76,175,124,0.15); color: var(--safe); }
  .danger-caution { background: rgba(216,167,63,0.15); color: var(--warn); }
  .danger-danger { background: rgba(224,85,106,0.15); color: var(--danger); }
  .danger-suicide { background: rgba(224,85,106,0.3); color: #ff7a8e; }

  .log-entry {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; margin-bottom: 6px;
    font-size: 12.5px; cursor: pointer;
  }
  .log-entry:hover { border-color: var(--accent); }
  .log-entry .t { color: var(--text-dim); margin-right: 6px; }

  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; z-index: 10;
  }
  .tabbar button {
    flex: 1; background: none; border-radius: 0; padding: 10px 4px;
    font-size: 11px; color: var(--text-dim); display: flex; flex-direction: column; gap: 2px; align-items: center;
  }
  .tabbar button.active { color: var(--accent); }

  .item-card {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
  }
  .item-card.equipped { border-color: var(--accent); }
  .item-name { font-weight: 600; color: #f0a85c; }
  .ability-tag {
    display: inline-block; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; font-size: 11px; margin: 2px 4px 0 0; color: var(--text-dim);
  }

  .mat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 8px; }
  .mat-card {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; text-align: center; cursor: pointer; user-select: none;
  }
  .mat-card.selected { border-color: var(--accent); background: rgba(124,109,240,0.15); }
  .mat-card .cnt { font-size: 11px; color: var(--text-dim); }
  .mat-card .corrupt { font-size: 10px; color: var(--gold); }

  .recipe-card {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px;
  }
  .recipe-card.craftable { border-color: var(--safe); }
  .recipe-need { font-size: 11px; color: var(--text-dim); }
  .recipe-need.ok { color: var(--safe); }
  .recipe-need.lack { color: var(--danger); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .stat-table { width: 100%; font-size: 12.5px; border-collapse: collapse; }
  .stat-table th, .stat-table td { padding: 4px 6px; text-align: right; border-bottom: 1px solid var(--border); }
  .stat-table th:first-child, .stat-table td:first-child { text-align: left; }

  .progress-bar-bg { background: var(--panel2); border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar-fill { background: var(--accent); height: 100%; }

  select, .equip-select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font-size: 12.5px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div style="font-weight:600;">たま</div>
    <div class="stat">瘴気度 <b id="topWorldLevel">0</b></div>
  </div>
  <div style="text-align:right;">
    <div class="stat">強さレーティング</div>
    <div style="font-weight:600; color: var(--gold);" id="topRating">0</div>
  </div>
</div>

<div class="screen" id="screen-dungeon">
  <div class="card">
    <h3>ダンジョンを選択</h3>
    <div class="dungeon-list" id="dungeonList"></div>
  </div>
  <div class="card hidden" id="explorePanel">
    <h3 id="exploreDungeonName"></h3>
    <div class="progress-bar-bg" style="margin-bottom:8px;">
      <div class="progress-bar-fill" id="exploreProgress" style="width:0%;"></div>
    </div>
    <div class="row" style="margin-bottom:8px;">
      <span class="muted" id="exploreStatus">準備中</span>
      <span class="muted" id="exploreFloor"></span>
    </div>
    <div class="row">
      <button class="secondary small" id="btnRetreat">途中帰還</button>
      <button class="small" id="btnNextStep">次のターンへ進む</button>
    </div>
  </div>
  <div class="card hidden" id="logPanel">
    <h3>探索の記録</h3>
    <div id="logList"></div>
  </div>
</div>

<div class="screen hidden" id="screen-smith">
  <div class="card">
    <h3>クラフト</h3>
    <p class="muted">作りたい装備をタップしてレシピを確認</p>
    <div class="row" style="margin-bottom:8px; gap:4px;">
      <select id="smithCategory" style="flex:1;">
        <option value="weapon">武器</option>
        <option value="armor">防具</option>
        <option value="accessory">アクセサリー</option>
      </select>
    </div>
    <div id="recipeList"></div>
  </div>
</div>

<div class="screen hidden" id="screen-item">
  <div class="card">
    <h3>所持装備</h3>
    <div id="itemList"></div>
  </div>
  <div class="card">
    <h3>所持素材</h3>
    <div class="mat-grid" id="materialGrid"></div>
  </div>
</div>

<div class="screen hidden" id="screen-status">
  <div class="card">
    <h3>つよさ</h3>
    <table class="stat-table" id="statusTable"></table>
  </div>
  <div class="card">
    <h3>現在の装備</h3>
    <div id="equippedList"></div>
  </div>
  <div class="card">
    <h3>侵食度ブースト</h3>
    <p class="muted" id="corruptionInfo"></p>
  </div>
</div>

<div class="screen hidden" id="screen-collection">
  <div class="card">
    <h3>図鑑・解析</h3>
    <p class="muted">解析Lvを上げると限界突破効果のロックが解除されます（テスト版は簡易表示）</p>
    <div class="row" style="margin-bottom:8px;">
      <span>図鑑の解析Lv</span>
      <b id="analysisLevelDisplay">1</b>
    </div>
    <button class="small" id="btnAnalyze">解析する（テスト用：Lv+1）</button>
  </div>
  <div class="card">
    <h3>限界突破ライン</h3>
    <div id="breakthroughList"></div>
  </div>
</div>

<div class="tabbar">
  <button class="tab-btn active" data-screen="dungeon"><span>⛰</span>DUNGEON</button>
  <button class="tab-btn" data-screen="smith"><span>⚒</span>SMITH</button>
  <button class="tab-btn" data-screen="collection"><span>📖</span>COLLECTION</button>
  <button class="tab-btn" data-screen="item"><span>🎒</span>ITEM</button>
  <button class="tab-btn" data-screen="status"><span>👤</span>STATUS</button>
</div>

<div id="modalRoot"></div>

      "dungeon": 8,
      "name": "魔王",
      "kind": "ボス",
      "hp": 990,
      "atk": 156,
      "def": 86,
      "spd": 31
    }
  ]
}
</script>
<script>
// ===================== データロード =====================
const GAME_DATA = JSON.parse(document.getElementById('game-data').textContent);

// ===================== 計算式（formulas.pyのJS版） =====================
function corruptionRange(worldLevel) {
  if (worldLevel <= 0) return [0, 0];
  const lo = (worldLevel - 1) * 200 + 1;
  const hi = worldLevel * 200;
  return [lo, hi];
}
function rollCorruption(worldLevel) {
  const [lo, hi] = corruptionRange(worldLevel);
  if (hi === 0) return 0;
  return lo + Math.floor(Math.random() * (hi - lo + 1));
}
const CORRUPTION_BOOST_CAP = 10.0;
const CORRUPTION_BOOST_K = 0.0008;
function corruptionBoost(corruption) {
  if (corruption <= 0) return 1.0;
  return 1 + (CORRUPTION_BOOST_CAP - 1) * (1 - Math.exp(-CORRUPTION_BOOST_K * corruption));
}
function requiredAnalysisLevel(line) {
  if (line < 250) return null;
  const stepsBeyond200 = Math.floor((line - 200) / 50);
  return 9 + stepsBeyond200;
}
const ENEMY_WORLDLEVEL_CAP = 8.0;
const ENEMY_WORLDLEVEL_K = 0.15;
function enemyWorldLevelMultiplier(worldLevel) {
  if (worldLevel <= 0) return 1.0;
  return 1 + (ENEMY_WORLDLEVEL_CAP - 1) * (1 - Math.exp(-ENEMY_WORLDLEVEL_K * worldLevel));
}
function calcDamage(atk, def) {
  return Math.max(1, Math.round(atk - def));
}

// ===================== ゲームステート =====================
const ABILITY_POOL = ["耐久","腕力","頑丈","機敏","幸運","体力の鍛錬","力の鍛錬","守りの鍛錬"];

const state = {
  worldLevel: 0,
  analysisLevel: 1,
  materials: {},      // id -> {count, corruptions: [..]}
  inventory: [],       // クラフト済み装備 [{uid, defId, category, abilities:[{name,lv}], corruption}]
  equipped: { weapon: null, armor: null, accessory: null }, // uid
  currentDungeon: null,
  exploreState: null,  // {floorIndex, log:[], finished}
  logSelectedIndex: null,
};

function findDef(category, id) {
  const pools = {
    weapon: [...GAME_DATA.weapons, ...GAME_DATA.rareWeapons],
    armor: [...GAME_DATA.armors, ...GAME_DATA.rareArmors],
    accessory: [...GAME_DATA.accessories, ...GAME_DATA.rareAccessories],
  };
  return pools[category].find(d => d.id === id);
}
function isRareId(id) { return id.startsWith('R') && (id.startsWith('RW') || id.startsWith('RA') || id.startsWith('RC')); }

function getMaterialDef(id) {
  return [...GAME_DATA.materials, ...GAME_DATA.rareMaterials].find(m => m.id === id);
}

// ===================== 初期素材を少し配布（テスト用） =====================
function addMaterial(id, count, corruption) {
  if (!state.materials[id]) state.materials[id] = { count: 0, corruptions: [] };
  state.materials[id].count += count;
  for (let i = 0; i < count; i++) state.materials[id].corruptions.push(corruption || 0);
}

// ===================== プレイヤーステータス計算 =====================
// 各装備が持つ能力(ability)が、Lv1基礎値 / LvUP成長値 にどう乗るかのマッピング
const ABILITY_EFFECT = {
  "耐久": { stat: "hp", target: "base" },
  "腕力": { stat: "str", target: "base" },
  "頑丈": { stat: "vit", target: "base" },
  "機敏": { stat: "spd", target: "base" },
  "幸運": { stat: "luk", target: "base" },
  "体力の鍛錬": { stat: "hp", target: "growth" },
  "力の鍛錬": { stat: "str", target: "growth" },
  "守りの鍛錬": { stat: "vit", target: "growth" },
};
// 能力1Lvあたりの基礎値増加（テスト用の仮値）
const ABILITY_BASE_PER_LV = { hp: 30, str: 80, vit: 50, spd: 3, luk: 2 };
const ABILITY_GROWTH_PER_LV = { hp: 3, str: 2, vit: 2, spd: 0.5, luk: 0.3 };

function computePlayerStats() {
  // ベース
  const base = { hp: 60, str: 5, vit: 5, spd: 1, luk: 1 };
  const growth = { hp: 18, str: 1, vit: 2, spd: 1, luk: 0 };
  let totalCorruptionSum = 0, totalCorruptionCount = 0;

  ['weapon','armor','accessory'].forEach(cat => {
    const uid = state.equipped[cat];
    if (!uid) return;
    const item = state.inventory.find(it => it.uid === uid);
    if (!item) return;
    item.abilities.forEach(ab => {
      const eff = ABILITY_EFFECT[ab.name];
      if (!eff) return;
      if (eff.target === 'base') base[eff.stat] += ABILITY_BASE_PER_LV[eff.stat] * ab.lv;
      else growth[eff.stat] += ABILITY_GROWTH_PER_LV[eff.stat] * ab.lv;
    });
    if (item.corruption > 0) { totalCorruptionSum += item.corruption; totalCorruptionCount++; }
  });

  const avgCorruption = totalCorruptionCount > 0 ? totalCorruptionSum / totalCorruptionCount : 0;
  const boost = corruptionBoost(avgCorruption);

  // 武器ATK・防具DEF
  let weaponAtk = 0, armorDef = 0;
  const wItem = state.inventory.find(it => it.uid === state.equipped.weapon);
  const aItem = state.inventory.find(it => it.uid === state.equipped.armor);
  if (wItem) { const d = findDef('weapon', wItem.defId); weaponAtk = d ? d.atk : 0; }
  if (aItem) { const d = findDef('armor', aItem.defId); armorDef = d ? d.def : 0; }

  return { base, growth, boost, avgCorruption, weaponAtk, armorDef };
}

function computeRating(stats) {
  const totalAtk = stats.weaponAtk * stats.boost;
  const totalDef = stats.armorDef * stats.boost;
  const hp = stats.base.hp * stats.boost;
  return Math.round(totalAtk * 2 + totalDef * 2 + hp * 0.5);
}

// ===================== 危険度ラベル =====================
function dangerLabelForDungeon(dungeonId) {
  const stats = computePlayerStats();
  const playerPower = (stats.weaponAtk + stats.armorDef) * stats.boost + stats.base.hp * stats.boost * 0.3;
  // ダンジョンのボス基準
  const boss = GAME_DATA.enemies.find(e => e.dungeon === dungeonId && e.kind === 'ボス');
  const mult = enemyWorldLevelMultiplier(state.worldLevel);
  const bossPower = (boss.atk + boss.def) * mult + boss.hp * mult * 0.3;
  const ratio = playerPower / bossPower;
  if (ratio >= 2.0) return { label: '安全', cls: 'danger-safe' };
  if (ratio >= 1.2) return { label: '注意', cls: 'danger-caution' };
  if (ratio >= 0.7) return { label: '危険', cls: 'danger-danger' };
  return { label: '自殺行為', cls: 'danger-suicide' };
}

// ===================== レンダリング: ダンジョン一覧 =====================
function renderDungeonList() {
  const el = document.getElementById('dungeonList');
  el.innerHTML = '';
  GAME_DATA.dungeons.forEach(d => {
    const danger = dangerLabelForDungeon(d.id);
    const div = document.createElement('div');
    div.className = 'dungeon-item';
    div.innerHTML = `
      <div>
        <div style="font-weight:600;">${d.id}. ${d.name}</div>
        <div class="muted">${d.theme}</div>
      </div>
      <span class="danger-label ${danger.cls}">${danger.label}</span>
    `;
    div.onclick = () => startExplore(d.id);
    el.appendChild(div);
  });
}

// ===================== 探索ロジック =====================
function startExplore(dungeonId) {
  state.currentDungeon = dungeonId;
  state.exploreState = { floorIndex: 1, log: [], finished: false, dead: false };
  document.getElementById('explorePanel').classList.remove('hidden');
  document.getElementById('logPanel').classList.remove('hidden');
  document.getElementById('exploreDungeonName').textContent =
    GAME_DATA.dungeons.find(d => d.id === dungeonId).name;
  updateExploreUI();
}

function getEnemyForFloor(dungeonId, floorIndex) {
  const pool = GAME_DATA.enemies.filter(e => e.dungeon === dungeonId);
  const isBossFloor = floorIndex % 5 === 0;
  const candidates = pool.filter(e => isBossFloor ? e.kind === 'ボス' : e.kind === '雑魚');
  return candidates[0] || pool[0];
}

function runOneTurn() {
  const ex = state.exploreState;
  if (!ex || ex.finished) return;
  const dungeonId = state.currentDungeon;
  const enemyDef = getEnemyForFloor(dungeonId, ex.floorIndex);
  const mult = enemyWorldLevelMultiplier(state.worldLevel);
  const enemy = {
    name: enemyDef.name,
    hp: Math.round(enemyDef.hp * mult),
    atk: Math.round(enemyDef.atk * mult),
    def: Math.round(enemyDef.def * mult),
    spd: enemyDef.spd,
  };
  const stats = computePlayerStats();
  const playerAtk = stats.weaponAtk * stats.boost;
  const playerDef = stats.armorDef * stats.boost;
  const playerHp = Math.round(stats.base.hp * stats.boost);
  const playerSpd = stats.base.spd;

  const turnLog = { time: new Date(), enemyName: enemy.name, floor: ex.floorIndex, actions: [], result: null, drops: [] };
  let curEnemyHp = enemy.hp;
  let curPlayerHp = playerHp;
  const playerFirst = playerSpd >= enemy.spd;

  function playerAttack() {
    const dmg = calcDamage(playerAtk, enemy.def);
    curEnemyHp -= dmg;
    turnLog.actions.push({ side: 'player', dmg, targetHpLeft: Math.max(0, curEnemyHp) });
  }
  function enemyAttack() {
    const dmg = calcDamage(enemy.atk, playerDef);
    curPlayerHp -= dmg;
    turnLog.actions.push({ side: 'enemy', dmg, targetHpLeft: Math.max(0, curPlayerHp) });
  }

  let rounds = 0;
  while (curEnemyHp > 0 && curPlayerHp > 0 && rounds < 50) {
    if (playerFirst) { playerAttack(); if (curEnemyHp <= 0) break; enemyAttack(); }
    else { enemyAttack(); if (curPlayerHp <= 0) break; playerAttack(); }
    rounds++;
  }

  if (curPlayerHp <= 0) {
    turnLog.result = 'dead';
    ex.finished = true;
    ex.dead = true;
  } else {
    turnLog.result = 'win';
    // ドロップ処理：そのダンジョンの通常素材からランダム1つ + 低確率レア
    const mats = GAME_DATA.materials.filter(m => m.dungeon === dungeonId);
    const rare = GAME_DATA.rareMaterials.find(m => m.dungeon === dungeonId);
    const dropMat = mats[Math.floor(Math.random() * mats.length)];
    const corruption = rollCorruption(state.worldLevel);
    addMaterial(dropMat.id, 1, corruption);
    turnLog.drops.push({ name: dropMat.name, corruption });
    if (rare && Math.random() < 0.05) {
      const rc = rollCorruption(state.worldLevel);
      addMaterial(rare.id, 1, rc);
      turnLog.drops.push({ name: rare.name, corruption: rc, isRare: true });
    }
    ex.floorIndex++;
    if (ex.floorIndex > 10) { ex.finished = true; }
  }

  ex.log.unshift(turnLog);
  updateExploreUI();
}

function retreatExplore() {
  if (!state.exploreState) return;
  state.exploreState.finished = true;
  state.exploreState.retreated = true;
  updateExploreUI();
}

function updateExploreUI() {
  const ex = state.exploreState;
  if (!ex) return;
  const progress = Math.min(100, (ex.floorIndex / 10) * 100);
  document.getElementById('exploreProgress').style.width = progress + '%';
  document.getElementById('exploreFloor').textContent = `${Math.min(ex.floorIndex,10)}/10階`;

  let statusText = `${ex.floorIndex}階を探索中`;
  if (ex.dead) statusText = '全滅...素材をすべて失った（探索終了）';
  else if (ex.retreated) statusText = '途中帰還した（素材を持って帰還）';
  else if (ex.finished) statusText = '最深部に到達！帰還した';
  document.getElementById('exploreStatus').textContent = statusText;

  document.getElementById('btnNextStep').disabled = ex.finished;
  document.getElementById('btnRetreat').disabled = ex.finished;

  if (ex.dead) {
    // 死亡：このセッションで得た素材を全ロスト
    ex.log.forEach(l => {
      l.drops.forEach(d => {
        // ロスト処理（簡易：該当素材を1減らす。テスト版なので簡略化)
      });
    });
  }

  renderLogList();
  renderTopBar();
}

function renderLogList() {
  const el = document.getElementById('logList');
  const ex = state.exploreState;
  el.innerHTML = '';
  if (!ex) return;
  ex.log.forEach((entry, idx) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const timeStr = entry.time.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    let summary = entry.result === 'dead'
      ? `${entry.enemyName}にやられた`
      : `${entry.enemyName}を倒した`;
    div.innerHTML = `<span class="t">${timeStr}</span>${entry.floor}階 ${summary}`;
    div.onclick = () => showLogDetail(entry);
    el.appendChild(div);
  });
}

function showLogDetail(entry) {
  const modal = document.getElementById('modalRoot');
  let actionsHtml = entry.actions.map(a => {
    return a.side === 'player'
      ? `<div class="log-entry">たまの攻撃：${entry.enemyName}に${a.dmg}のダメージ（残り${a.targetHpLeft}）</div>`
      : `<div class="log-entry">${entry.enemyName}の反撃：たまに${a.dmg}のダメージ（残り${a.targetHpLeft}）</div>`;
  }).join('');
  let dropsHtml = entry.drops.length
    ? entry.drops.map(d => `<div class="log-entry">${d.name}を入手（侵食度${Math.round(d.corruption)}）${d.isRare ? ' ★レア' : ''}</div>`).join('')
    : '';
  let resultHtml = entry.result === 'dead'
    ? `<div class="log-entry" style="color:var(--danger);">全滅した…</div>`
    : `<div class="log-entry">${entry.enemyName}を倒した</div>`;

  modal.innerHTML = `
    <div class="modal-overlay" id="logModalOverlay">
      <div class="modal">
        <h3>${entry.floor}階の記録</h3>
        ${actionsHtml}
        ${resultHtml}
        ${dropsHtml}
        <button class="secondary" style="margin-top:10px;width:100%;" id="closeLogModal">閉じる</button>
      </div>
    </div>
  `;
  document.getElementById('closeLogModal').onclick = () => { modal.innerHTML = ''; };
  document.getElementById('logModalOverlay').onclick = (e) => { if (e.target.id === 'logModalOverlay') modal.innerHTML = ''; };
}

// ===================== クラフト（SMITH） =====================
function getRecipePools(category) {
  if (category === 'weapon') return [...GAME_DATA.weapons, ...GAME_DATA.rareWeapons];
  if (category === 'armor') return [...GAME_DATA.armors, ...GAME_DATA.rareArmors];
  return [...GAME_DATA.accessories, ...GAME_DATA.rareAccessories];
}

function hasInventoryItem(defId) {
  return state.inventory.find(it => it.defId === defId);
}

function canCraft(recipeDef, category) {
  return recipeDef.recipe.every(([matOrItemId, need]) => {
    if (matOrItemId.startsWith('M') || matOrItemId.startsWith('R')) {
      const have = state.materials[matOrItemId]?.count || 0;
      return have >= need;
    } else {
      // 装備消費型（進化）
      return hasInventoryItem(matOrItemId);
    }
  });
}

function renderRecipeList() {
  const category = document.getElementById('smithCategory').value;
  const pool = getRecipePools(category);
  const el = document.getElementById('recipeList');
  el.innerHTML = '';
  pool.forEach(def => {
    const craftable = canCraft(def, category);
    const div = document.createElement('div');
    div.className = 'recipe-card' + (craftable ? ' craftable' : '');
    const isRare = def.id.match(/^R[WAC]/);
    const recipeHtml = def.recipe.map(([id, need]) => {
      let name, have;
      if (id.startsWith('M') || (id.startsWith('R') && id.length === 3)) {
        const md = getMaterialDef(id);
        name = md ? md.name : id;
        have = state.materials[id]?.count || 0;
      } else {
        const owned = hasInventoryItem(id);
        const d2 = findDef(category, id);
        name = d2 ? d2.name : id;
        have = owned ? 1 : 0;
      }
      const ok = have >= need;
      return `<span class="recipe-need ${ok ? 'ok' : 'lack'}">${name} ${have}/${need}</span>`;
    }).join('　');
    div.innerHTML = `
      <div class="row">
        <span class="item-name">${def.name}${isRare ? ' ★' : ''}</span>
        <button class="small" ${craftable ? '' : 'disabled'} data-craft="${def.id}" data-cat="${category}">クラフト</button>
      </div>
      <div style="margin-top:4px;">${recipeHtml}</div>
    `;
    el.appendChild(div);
  });
  el.querySelectorAll('[data-craft]').forEach(btn => {
    btn.onclick = () => craftItem(btn.dataset.craft, btn.dataset.cat);
  });
}

function rollAbilitiesFromMaterials(materialIds, isRareCraft, guaranteed) {
  // 通常: 使用素材のweightsからランダムに最大3つ選ぶ（重複OK、簡易実装）
  let pool = [];
  materialIds.forEach(id => {
    const md = getMaterialDef(id);
    if (md) pool.push(...md.weights);
  });
  if (pool.length === 0) pool = ABILITY_POOL;
  const abilities = [];
  const slots = isRareCraft ? (guaranteed ? guaranteed.length : 3) : 3;
  if (isRareCraft && guaranteed) {
    guaranteed.forEach(name => abilities.push({ name, lv: 5 + Math.floor(Math.random() * 5) }));
  } else {
    for (let i = 0; i < slots; i++) {
      const name = pool[Math.floor(Math.random() * pool.length)];
      abilities.push({ name, lv: 1 + Math.floor(Math.random() * 5) });
    }
  }
  return abilities;
}

let uidCounter = 1;
function craftItem(defId, category) {
  const def = findDef(category, defId);
  if (!def) return;
  const isRare = !!def.guaranteed;
  // 素材/装備消費
  const usedMaterialIds = [];
  const usedCorruptions = [];
  def.recipe.forEach(([id, need]) => {
    if (id.startsWith('M') || (id.startsWith('R') && id.length === 3)) {
      const m = state.materials[id];
      for (let i = 0; i < need; i++) {
        usedCorruptions.push(m.corruptions.pop());
        usedMaterialIds.push(id);
      }
      m.count -= need;
    } else {
      // 進化元装備を消費
      const idx = state.inventory.findIndex(it => it.defId === id);
      if (idx >= 0) {
        usedCorruptions.push(state.inventory[idx].corruption || 0);
        state.inventory.splice(idx, 1);
        // 装備していたら外す
        Object.keys(state.equipped).forEach(k => {
          if (state.equipped[k] && !state.inventory.find(it => it.uid === state.equipped[k])) state.equipped[k] = null;
        });
      }
    }
  });

  const abilities = rollAbilitiesFromMaterials(usedMaterialIds, isRare, def.guaranteed);
  const corruption = usedCorruptions.length ? usedCorruptions.reduce((a,b)=>a+b,0) / usedCorruptions.length : 0;

  const item = {
    uid: 'item' + (uidCounter++),
    defId,
    category,
    abilities,
    corruption,
  };
  state.inventory.push(item);
  renderRecipeList();
  renderMaterialGrid();
  alert(`${def.name} をクラフトした！`);
}

// ===================== ITEM画面 =====================
function renderItemList() {
  const el = document.getElementById('itemList');
  el.innerHTML = '';
  if (state.inventory.length === 0) {
    el.innerHTML = '<p class="muted">まだ装備がありません。SMITHでクラフトしましょう。</p>';
    return;
  }
  state.inventory.forEach(item => {
    const def = findDef(item.category, item.defId);
    const isEquipped = state.equipped[item.category] === item.uid;
    const div = document.createElement('div');
    div.className = 'item-card' + (isEquipped ? ' equipped' : '');
    const statLine = item.category === 'weapon' ? `ATK:${def.atk}` : item.category === 'armor' ? `DEF:${def.def}` : '';
    const abilitiesHtml = item.abilities.map(a => `<span class="ability-tag">${a.name} Lv${a.lv}</span>`).join('');
    div.innerHTML = `
      <div class="row">
        <span class="item-name">${isEquipped ? '【E】' : ''}${def.name} (${statLine}) 侵食度${Math.round(item.corruption)}</span>
        <button class="small ${isEquipped ? 'secondary' : ''}" data-equip="${item.uid}" data-cat="${item.category}">${isEquipped ? '解除' : '装備'}</button>
      </div>
      <div>${abilitiesHtml}</div>
    `;
    el.appendChild(div);
  });
  el.querySelectorAll('[data-equip]').forEach(btn => {
    btn.onclick = () => {
      const cat = btn.dataset.cat;
      const uid = btn.dataset.equip;
      state.equipped[cat] = state.equipped[cat] === uid ? null : uid;
      renderItemList();
      renderStatusScreen();
      renderDungeonList();
      renderTopBar();
    };
  });
}

function renderMaterialGrid() {
  const el = document.getElementById('materialGrid');
  el.innerHTML = '';
  Object.entries(state.materials).forEach(([id, data]) => {
    if (data.count <= 0) return;
    const md = getMaterialDef(id);
    const avgCorruption = data.corruptions.length ? data.corruptions.reduce((a,b)=>a+b,0)/data.corruptions.length : 0;
    const div = document.createElement('div');
    div.className = 'mat-card';
    div.innerHTML = `
      <div>${md.name}</div>
      <div class="cnt">×${data.count}</div>
      <div class="corrupt">${avgCorruption > 0 ? '侵食度' + Math.round(avgCorruption) : ''}</div>
    `;
    el.appendChild(div);
  });
  if (Object.values(state.materials).every(d => d.count <= 0)) {
    el.innerHTML = '<p class="muted">素材がありません。ダンジョンで集めましょう。</p>';
  }
}

// ===================== STATUS画面 =====================
function renderStatusScreen() {
  const stats = computePlayerStats();
  const table = document.getElementById('statusTable');
  const rows = [
    ['HP', Math.round(stats.base.hp * stats.boost), stats.growth.hp],
    ['STR', Math.round(stats.base.str * stats.boost), stats.growth.str],
    ['VIT', Math.round(stats.base.vit * stats.boost), stats.growth.vit],
    ['SPD', Math.round(stats.base.spd * stats.boost), stats.growth.spd],
    ['LUK(ドロップ補正)', Math.round(stats.base.luk * stats.boost), stats.growth.luk],
  ];
  table.innerHTML = `
    <tr><th>項目</th><th>Lv1(基礎値)</th><th>LvUP</th></tr>
    ${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>+${r[2].toFixed(1)}</td></tr>`).join('')}
  `;

  const eqEl = document.getElementById('equippedList');
  eqEl.innerHTML = ['weapon','armor','accessory'].map(cat => {
    const uid = state.equipped[cat];
    if (!uid) return `<div class="muted">${labelOf(cat)}: 未装備</div>`;
    const item = state.inventory.find(it => it.uid === uid);
    const def = findDef(cat, item.defId);
    return `<div>${labelOf(cat)}: <span class="item-name">${def.name}</span></div>`;
  }).join('');

  document.getElementById('corruptionInfo').textContent =
    `現在の平均侵食度: ${Math.round(stats.avgCorruption)} → ブースト倍率 x${stats.boost.toFixed(2)}`;

  document.getElementById('topRating').textContent = computeRating(stats).toLocaleString();
}
function labelOf(cat) { return cat === 'weapon' ? '武器' : cat === 'armor' ? '防具' : 'アクセサリー'; }

// ===================== COLLECTION画面 =====================
function renderCollectionScreen() {
  document.getElementById('analysisLevelDisplay').textContent = state.analysisLevel;
  const el = document.getElementById('breakthroughList');
  el.innerHTML = '';
  for (let line = 50; line <= 500; line += 50) {
    const req = requiredAnalysisLevel(line);
    const locked = req !== null && state.analysisLevel < req;
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `~${line}以上：${locked ? `🔒 解析Lv${req}で解除` : '発現可能'}`;
    el.appendChild(div);
  }
}

// ===================== トップバー =====================
function renderTopBar() {
  document.getElementById('topWorldLevel').textContent = state.worldLevel;
}

// ===================== タブ切り替え =====================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + btn.dataset.screen).classList.remove('hidden');
    if (btn.dataset.screen === 'item') { renderItemList(); renderMaterialGrid(); }
    if (btn.dataset.screen === 'status') renderStatusScreen();
    if (btn.dataset.screen === 'smith') renderRecipeList();
    if (btn.dataset.screen === 'collection') renderCollectionScreen();
    if (btn.dataset.screen === 'dungeon') renderDungeonList();
  };
});

document.getElementById('smithCategory').onchange = renderRecipeList;
document.getElementById('btnNextStep').onclick = runOneTurn;
document.getElementById('btnRetreat').onclick = retreatExplore;
document.getElementById('btnAnalyze').onclick = () => {
  state.analysisLevel++;
  renderCollectionScreen();
};

// ===================== 初期化 =====================
function init() {
  // テスト用に初期素材を少し配布
  addMaterial('M01', 5, 0);
  addMaterial('M02', 5, 0);
  addMaterial('M03', 3, 0);
  renderDungeonList();
  renderTopBar();
}
init();

</script>
