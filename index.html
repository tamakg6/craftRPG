<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理想のログクラフトRPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <header id="status-header">
        <div class="status-item">武器: <span id="current-weapon">ボロい剣</span> (ATK: <span id="player-atk">10</span>)</div>
        <div class="status-item">討伐: <span id="kill-count">0</span></div>
    </header>

    <div id="inventory-bar">
        <span>銅鉱石:<b id="mat-copper">0</b></span>
        <span>鉄鉱石:<b id="mat-iron">0</b></span>
        <span>魔物の骨:<b id="mat-bone">0</b></span>
    </div>

    <div class="tab-container">
        <button id="tab-dungeon" class="tab-btn active" onclick="switchTab('dungeon')">ダンジョン探索</button>
        <button id="tab-forge" class="tab-btn" onclick="switchTab('forge')">街の鍛冶屋</button>
    </div>

    <main id="main-content">
        <div id="panel-dungeon" class="content-panel active">
            <div class="dungeon-select">
                <p>探索するエリアを選択してください：</p>
                <button class="action-btn" onclick="explore('cave')">薄暗い洞窟を探索 (手動)</button>
                <button class="action-btn" onclick="explore('ruins')" style="margin-top: 10px; background: #9b59b6;">古びた遺跡を探索 (手動)</button>
            </div>
        </div>

        <div id="panel-forge" class="content-panel">
            <p>集めた素材で武器を鍛造します（ガチャ・直ドロなし）：</p>
            <div class="recipe-list">
                <div class="recipe-card">
                    <div class="recipe-info">
                        <strong>ブロンズソード</strong>
                        <span class="recipe-effect">攻撃力 10 → 25</span>
                        <span class="recipe-cost">必要: 銅鉱石×3</span>
                    </div>
                    <button id="btn-craft-bronze" class="craft-btn" onclick="craftWeapon('bronze')">鍛造</button>
                </div>
                <div class="recipe-card">
                    <div class="recipe-info">
                        <strong>アイアンエッジ</strong>
                        <span class="recipe-effect">攻撃力 10 → 50</span>
                        <span class="recipe-cost">必要: 鉄鉱石×5, 骨×2</span>
                    </div>
                    <button id="btn-craft-iron" class="craft-btn" onclick="craftWeapon('iron')">鍛造</button>
                </div>
            </div>
        </div>
    </main>

    <div id="log-container">
        <div id="game-log">
            <div class="log-system">ゲームが開始されました。素材を集めて強力な武器を作りましょう。</div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
